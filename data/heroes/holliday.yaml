    duration: 10
    base_damage: 0
    spirit_scaling: 0
    upgrades:
      - tier: 1
        description: -8s cooldown
      - tier: 2
        description: Launch height increased by 50%
      - tier: 3
        description: Nearby enemies who touch pad are launched and stunned
