    ability_type: active
    description: Holliday rapidly fires a volley of shots in a forward cone.
    cooldown: 14
    duration: 0
    base_damage: 120
    spirit_scaling: 0.2
    upgrades:
      - tier: 1
        description: +50 damage
      - tier: 2
        description: +3 additional shots
      - tier: 3
        description: Grants brief invulnerability during Quick Draw
  - name: Dead Eye
    ability_type: ultimate
    description: Holliday enters a focused state, auto-targeting and dealing devastating headshot damage to all visible enemies.
    cooldown: 110
    duration: 4
    base_damage: 200
    spirit_scaling: 0
    upgrades:
      - tier: 1
        description: +2s duration
      - tier: 2
        description: Headshot multiplier increased by 30%
      - tier: 3
        description: Kills during Dead Eye reset other cooldowns
