name: Paradox
gun:
  base_bullet_damage: 6.42
  pellets: 1
  alt_fire_type: zoom
  alt_fire_pellets: 1
  base_ammo: 40
  base_fire_rate: 7.56
  falloff_range_min: 20.0
  falloff_range_max: 58.0
survivability:
  base_hp: 700.0
  base_regen: 1.0
  base_move_speed: 6.8
  base_sprint: 0.5
  base_stamina: 3
scaling:
  damage_gain: 0.24
  hp_gain: 45.0
  spirit_gain: 1.1
hero_labs: false

abilities:
  - name: Kinetic Carbine
    ability_type: active
    description: Fires a bullet that stops time for the hit enemy, briefly freezing them in place.
    cooldown: 18
    duration: 0
    base_damage: 150
    spirit_scaling: 0.8
    upgrades:
      - tier: 1
        description: +0.5s time stop duration
      - tier: 2
        description: +60 damage
      - tier: 3
        description: Enemy is launched backwards when time resumes
  - name: Time Wall
    ability_type: active
    description: Creates a planar wall of time distortion. Enemies who pass through are slowed heavily.
    cooldown: 22
    duration: 5
    base_damage: 0
    spirit_scaling: 0.3
    upgrades:
      - tier: 1
        description: +2s wall duration
      - tier: 2
        description: Wall also deals 40 damage to passing enemies
      - tier: 3
        description: Wall also silences enemies passing through
  - name: Pulse Grenade
    ability_type: active
    description: Throws a grenade that creates a time-distortion field, slowing all enemies inside.
    cooldown: 14
    duration: 3
    base_damage: 80
    spirit_scaling: 0.5
    upgrades:
      - tier: 1
        description: +30 damage
      - tier: 2
        description: +1s field duration
      - tier: 3
        description: Field also reduces enemy damage output by 25%
  - name: Paradoxical Swap
    ability_type: ultimate
    description: Paradox instantly swaps positions with a targeted enemy.
    cooldown: 120
    duration: 0
    base_damage: 0
    spirit_scaling: 0
    upgrades:
      - tier: 1
        description: -30s cooldown
      - tier: 2
        description: Also swaps movement speeds for 3s
      - tier: 3
        description: Target is stunned for 1.5s after the swap
