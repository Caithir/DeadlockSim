name: Viscous
gun:
  base_bullet_damage: 10.3
  pellets: 1
  alt_fire_type: '42'
  alt_fire_pellets: 1
  base_ammo: 24
  base_fire_rate: 4.76
  falloff_range_min: 20.0
  falloff_range_max: 58.0
survivability:
  base_hp: 750.0
