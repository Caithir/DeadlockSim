abilities:
  - name: Static Charge
    ability_type: innate
    description: Seven passively builds up electricity. At full charge, his next ability or hit releases a chaining lightning bolt.
    cooldown: 0
    duration: 0
    base_damage: 50
    spirit_scaling: 0.3
    upgrades:
      - tier: 1
        description: Charge builds 30% faster
      - tier: 2
        description: +30 bolt damage
      - tier: 3
        description: Bolt chains to 3 additional targets
