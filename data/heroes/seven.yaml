    ability_type: active
    description: Seven releases a focused bolt of lightning at a target, dealing damage and applying a brief shock.
    cooldown: 15
    duration: 0
    base_damage: 120
    spirit_scaling: 0.6
    upgrades:
      - tier: 1
        description: +50 damage
      - tier: 2
        description: Bolt pierces through enemies in a line
      - tier: 3
        description: Stuns the primary target for 1s
  - name: Storm Cloud
    ability_type: active
    description: Seven calls down a lightning storm at a target area, continuously striking enemies inside.
    cooldown: 25
    duration: 4
    base_damage: 80
    spirit_scaling: 0.7
    upgrades:
      - tier: 1
        description: +1s duration
      - tier: 2
        description: +30/s lightning damage
      - tier: 3
        description: Storm also slows enemies inside by 25%
  - name: Lightning Ball
    ability_type: ultimate
    description: Seven conjures a massive ball of lightning that slowly rolls forward, zapping everything it touches.
    cooldown: 110
    duration: 8
    base_damage: 60
    spirit_scaling: 0.8
    upgrades:
      - tier: 1
        description: +3s duration
      - tier: 2
        description: Ball moves 40% faster
